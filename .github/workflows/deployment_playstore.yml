# Workflow to deploy the Android release to the Play Store
name: Deploy to Play Store

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: 17

      - name: Configure keys for production
        shell: bash
        env:
          GOOGLE_AUTH_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_AUTH_SERVER_CLIENT_ID }}
          GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY: ${{ secrets.GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY }}
          GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION }}
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo google.auth.server.client.id=$GOOGLE_AUTH_SERVER_CLIENT_ID > ./local.properties
          echo google.ai.client.generativeai.api.key=$GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY >> ./local.properties
          echo google.maps.android.api.key.production=$GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION >> ./local.properties

          echo "✅ local.properties configured for production."

          mkdir -p ./apps/mobile/src/production/
          echo "$GOOGLE_SERVICES_JSON" > ./apps/mobile/src/production/google-services.json.input
          if grep -q '"project_info"' ./apps/mobile/src/production/google-services.json.input; then
            cp ./apps/mobile/src/production/google-services.json.input ./apps/mobile/src/production/google-services.json
          else
            gpg -d --passphrase "$GPG_PASSPHRASE" --batch ./apps/mobile/src/production/google-services.json.input > ./apps/mobile/src/production/google-services.json
          fi

          if [ ! -s ./apps/mobile/src/production/google-services.json ]; then
            echo "❌ Decryption failed or file is empty (production)!"
            exit 1
          fi

          echo "✅ Production google-services.json prepared."

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '2.7'

      - name: Install bundler and dependencies
        run: |
          gem install bundler:2.2.27
          bundle config path vendor/bundle
          bundle install --jobs 4 --retry 3

      - name: Configure keystore and Play Store credentials
        shell: bash
        env:
          RELEASE_KEYSTORE_PROPERTIES_ASC: ${{ secrets.RELEASE_KEYSTORE_PROPERTIES }}
          RELEASE_KEYSTORE_ASC: ${{ secrets.RELEASE_KEYSTORE }}
          PLAYSTORE_CREDENTIALS_ASC: ${{ secrets.PLAYSTORE_CREDENTIALS }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$RELEASE_KEYSTORE_PROPERTIES_ASC" > ./release.keystore.properties.asc
          gpg -d --passphrase "$GPG_PASSPHRASE" --batch ./release.keystore.properties.asc > ./release.keystore.properties

          echo "$RELEASE_KEYSTORE_ASC" > ./release.keystore.asc
          gpg -d --passphrase "$GPG_PASSPHRASE" --batch ./release.keystore.asc > ./release.keystore

          echo "$PLAYSTORE_CREDENTIALS_ASC" > ./playstore.credentials.json.asc
          gpg -d --passphrase "$GPG_PASSPHRASE" --batch ./playstore.credentials.json.asc > ./playstore.credentials.json

      - name: Build Android App Bundle
        run: ./gradlew :apps:mobile:bundleProductionRelease --stacktrace

      - name: Build Wear OS App Bundle
        run: ./gradlew :apps:wear:bundleProductionRelease --stacktrace

      - name: Build & deploy Android release to Play Store
        run: bundler exec fastlane android deploy_playstore

      - name: Retrieve release metadata
        id: android_version
        run: |
          echo "version_name=$(${{ github.workspace }}/gradlew -q :apps:mobile:printAndroidVersionName)" >> "$GITHUB_OUTPUT"
          echo "release_tag=$(${{ github.workspace }}/gradlew -q :apps:mobile:printAndroidReleaseTag)" >> "$GITHUB_OUTPUT"
          echo "wear_version_name=$(${{ github.workspace }}/gradlew -q :apps:wear:printWearVersionName)" >> "$GITHUB_OUTPUT"
          echo "wear_version_code=$(${{ github.workspace }}/gradlew -q :apps:wear:printWearVersionCode)" >> "$GITHUB_OUTPUT"

      - name: Push Git Tag
        id: push_android_tag
        shell: bash
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@users.noreply.github.com"
          release_tag="${{ steps.android_version.outputs.release_tag }}"

          if git ls-remote --exit-code --tags origin "$release_tag" >/dev/null 2>&1; then
            echo "status=available" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "$release_tag"

          if git push origin "$release_tag"; then
            echo "status=available" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Play deploy succeeded but pushing tag $release_tag failed. Create the tag/release manually if needed."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        if: ${{ steps.push_android_tag.outputs.status == 'available' }}
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.android_version.outputs.release_tag }}
          release_name: "Android ${{ steps.android_version.outputs.version_name }}"
          draft: false
          prerelease: false

      - name: Note skipped Android release automation
        if: ${{ steps.push_android_tag.outputs.status == 'skipped' }}
        run: echo "Android deploy completed, but GitHub tag/release creation was skipped due to token permissions."
