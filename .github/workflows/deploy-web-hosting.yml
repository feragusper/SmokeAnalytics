name: Deploy Web (Firebase Hosting)

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, prod]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17

      - name: Build web bundle + prepare hosting dir
        run: ./gradlew :apps:web:prepareFirebaseHosting -Psmoke.env=${{ inputs.env }} --no-configuration-cache --rerun-tasks

      - name: Retrieve web release metadata
        if: ${{ inputs.env == 'prod' }}
        id: web_version
        run: |
          echo "version_name=$(${{ github.workspace }}/gradlew -q :apps:web:printWebVersionName -Psmoke.env=prod)" >> "$GITHUB_OUTPUT"
          echo "release_tag=$(${{ github.workspace }}/gradlew -q :apps:web:printWebReleaseTag -Psmoke.env=prod)" >> "$GITHUB_OUTPUT"

      - name: Load release notes
        if: ${{ inputs.env == 'prod' }}
        id: release_notes
        shell: bash
        run: |
          product_version="$(grep '^product.version=' version.properties | cut -d= -f2)"
          notes_path="docs/releases/${product_version}.md"

          if [ ! -f "$notes_path" ]; then
            echo "Missing release notes file at $notes_path"
            exit 1
          fi

          echo "path=$notes_path" >> "$GITHUB_OUTPUT"

      - name: Install Firebase Functions dependencies
        run: npm --prefix functions install

      - name: Select Firebase project settings
        id: firebase_env
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS_STAGING: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS_STAGING }}
          FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS }}
          WEB_COACH_GEMINI_API_KEY_STAGING: ${{ secrets.WEB_COACH_GEMINI_API_KEY_STAGING }}
          WEB_COACH_GEMINI_API_KEY_PROD: ${{ secrets.WEB_COACH_GEMINI_API_KEY_PROD }}
        run: |
          if [ "${{ inputs.env }}" = "prod" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS" > "$RUNNER_TEMP/firebase-service-account.json"
            printf "%s" "$WEB_COACH_GEMINI_API_KEY_PROD" > "$RUNNER_TEMP/coach-gemini-api-key.txt"
            echo "project_id=smoke-analytics" >> "$GITHUB_OUTPUT"
            echo "hosting_target=prod" >> "$GITHUB_OUTPUT"
          else
            echo "$FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS_STAGING" > "$RUNNER_TEMP/firebase-service-account.json"
            printf "%s" "$WEB_COACH_GEMINI_API_KEY_STAGING" > "$RUNNER_TEMP/coach-gemini-api-key.txt"
            echo "project_id=smoke-analytics-staging" >> "$GITHUB_OUTPUT"
            echo "hosting_target=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync coach relay secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools functions:secrets:set COACH_GEMINI_API_KEY --project "${{ steps.firebase_env.outputs.project_id }}" --data-file "${{ runner.temp }}/coach-gemini-api-key.txt" --force

      - name: Deploy Firebase Hosting + coach relay
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools deploy --project "${{ steps.firebase_env.outputs.project_id }}" --only "functions:coachRelay,hosting:${{ steps.firebase_env.outputs.hosting_target }}" --non-interactive

      - name: Push Web Git Tag
        if: ${{ inputs.env == 'prod' }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@users.noreply.github.com"
          git tag "${{ steps.web_version.outputs.release_tag }}"
          git push origin "${{ steps.web_version.outputs.release_tag }}"

      - name: Create Web Release
        if: ${{ inputs.env == 'prod' }}
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.web_version.outputs.release_tag }}
          release_name: "Web ${{ steps.web_version.outputs.version_name }}"
          body_path: ${{ steps.release_notes.outputs.path }}
          draft: false
          prerelease: false
