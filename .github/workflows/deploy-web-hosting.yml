name: Deploy Web (Firebase Hosting)

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, prod]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_CLI_EXPERIMENTS: webframeworks

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17

      - name: Build web bundle + prepare hosting dir
        env:
          GOOGLE_AUTH_SERVER_CLIENT_ID_STAGING: ${{ secrets.GOOGLE_AUTH_SERVER_CLIENT_ID_STAGING }}
          GOOGLE_AUTH_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_AUTH_SERVER_CLIENT_ID }}
          GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY_STAGING: ${{ secrets.GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY_STAGING }}
          GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY: ${{ secrets.GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY }}
          GOOGLE_MAPS_ANDROID_API_KEY_STAGING: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY_STAGING }}
          GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION }}
        shell: bash
        run: |
          echo google.auth.server.client.id=$GOOGLE_AUTH_SERVER_CLIENT_ID > ./local.properties
          echo google.auth.server.client.id.staging=$GOOGLE_AUTH_SERVER_CLIENT_ID_STAGING >> ./local.properties
          echo google.ai.client.generativeai.api.key=$GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY >> ./local.properties
          echo google.ai.client.generativeai.api.key.staging=$GOOGLE_AI_CLIENT_GENERATIVEAI_API_KEY_STAGING >> ./local.properties
          echo google.maps.android.api.key.production=$GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION >> ./local.properties
          echo google.maps.android.api.key.staging=$GOOGLE_MAPS_ANDROID_API_KEY_STAGING >> ./local.properties
          ./gradlew :apps:web:prepareFirebaseHosting -Psmoke.env=${{ inputs.env }} --no-configuration-cache --rerun-tasks

      - name: Retrieve web release metadata
        if: ${{ inputs.env == 'prod' }}
        id: web_version
        run: |
          echo "version_name=$(${{ github.workspace }}/gradlew -q :apps:web:printWebVersionName -Psmoke.env=prod)" >> "$GITHUB_OUTPUT"
          echo "release_tag=$(${{ github.workspace }}/gradlew -q :apps:web:printWebReleaseTag -Psmoke.env=prod)" >> "$GITHUB_OUTPUT"

      - name: Install Firebase Functions dependencies
        run: npm --prefix functions install

      - name: Select Firebase project settings
        id: firebase_env
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS_STAGING: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS_STAGING }}
          FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS }}
          WEB_COACH_GEMINI_API_KEY_STAGING: ${{ secrets.WEB_COACH_GEMINI_API_KEY_STAGING }}
          WEB_COACH_GEMINI_API_KEY_PROD: ${{ secrets.WEB_COACH_GEMINI_API_KEY_PROD }}
        run: |
          if [ "${{ inputs.env }}" = "prod" ]; then
            echo "$FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS" > "$RUNNER_TEMP/firebase-service-account.json"
            printf "%s" "$WEB_COACH_GEMINI_API_KEY_PROD" > "$RUNNER_TEMP/coach-gemini-api-key.txt"
            echo "project_id=smoke-analytics" >> "$GITHUB_OUTPUT"
            echo "hosting_target=prod" >> "$GITHUB_OUTPUT"
          else
            echo "$FIREBASE_SERVICE_ACCOUNT_SMOKE_ANALYTICS_STAGING" > "$RUNNER_TEMP/firebase-service-account.json"
            printf "%s" "$WEB_COACH_GEMINI_API_KEY_STAGING" > "$RUNNER_TEMP/coach-gemini-api-key.txt"
            echo "project_id=smoke-analytics-staging" >> "$GITHUB_OUTPUT"
            echo "hosting_target=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync coach relay secret
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools@15.13.0 functions:secrets:set COACH_GEMINI_API_KEY --project "${{ steps.firebase_env.outputs.project_id }}" --data-file "${{ runner.temp }}/coach-gemini-api-key.txt" --force

      - name: Deploy Firebase Hosting + coach relay
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
        run: npx firebase-tools@15.13.0 deploy --project "${{ steps.firebase_env.outputs.project_id }}" --only "functions:coachRelay,hosting:${{ steps.firebase_env.outputs.hosting_target }}" --non-interactive --force

      - name: Push Web Git Tag
        if: ${{ inputs.env == 'prod' }}
        id: push_web_tag
        shell: bash
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@users.noreply.github.com"
          release_tag="${{ steps.web_version.outputs.release_tag }}"

          if git ls-remote --exit-code --tags origin "$release_tag" >/dev/null 2>&1; then
            echo "status=available" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git tag "$release_tag"

          if git push origin "$release_tag"; then
            echo "status=available" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Web deploy succeeded but pushing tag $release_tag failed. Create the tag/release manually if needed."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Web Release
        if: ${{ inputs.env == 'prod' && steps.push_web_tag.outputs.status == 'available' }}
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.web_version.outputs.release_tag }}
          release_name: "Web ${{ steps.web_version.outputs.version_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Note skipped web release automation
        if: ${{ inputs.env == 'prod' && steps.push_web_tag.outputs.status == 'skipped' }}
        run: echo "Web deploy completed, but GitHub tag/release creation was skipped due to token permissions."
