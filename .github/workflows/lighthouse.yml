name: Lighthouse Architecture Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
      - develop
  push:
    branches:
      - master

concurrency:
  group: lighthouse-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Architecture Audit
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: write
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: zulu
          java-version: 17

      - name: Configure local.properties
        shell: bash
        env:
          GOOGLE_AUTH_SERVER_CLIENT_ID: ${{ secrets.GOOGLE_AUTH_SERVER_CLIENT_ID }}
          GOOGLE_AUTH_SERVER_CLIENT_ID_STAGING: ${{ secrets.GOOGLE_AUTH_SERVER_CLIENT_ID_STAGING }}
          GOOGLE_MAPS_ANDROID_API_KEY_STAGING: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY_STAGING }}
          GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION }}
        run: |
          echo google.auth.server.client.id=$GOOGLE_AUTH_SERVER_CLIENT_ID > ./local.properties
          echo google.auth.server.client.id.staging=$GOOGLE_AUTH_SERVER_CLIENT_ID_STAGING >> ./local.properties
          echo google.maps.android.api.key.staging=$GOOGLE_MAPS_ANDROID_API_KEY_STAGING >> ./local.properties
          echo google.maps.android.api.key.production=$GOOGLE_MAPS_ANDROID_API_KEY_PRODUCTION >> ./local.properties

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Run Lighthouse Audit
        id: lighthouse
        run: |
          ./gradlew lighthouseAudit lighthouseAggregate --continue 2>&1 | tee /tmp/lighthouse-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Write Job Summary
        if: always()
        run: |
          echo "## 🏠 Lighthouse Architecture Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # Extract score lines and key findings from output
          grep -E "(Score|🏆|⭐|🔧|⚠️|🔴|FATAL|ERROR|Cycle|Layer|Gate|Dashboard)" /tmp/lighthouse-output.txt \
            | head -40 \
            | sed 's/^/> /' >> $GITHUB_STEP_SUMMARY || true
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 Full HTML reports available in the **lighthouse-reports** artifact below." >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/lighthouse-output.txt', 'utf8');

            // Extract meaningful lines
            const keep = raw.split('\n').filter(l =>
              /Score|🏆|⭐|🔧|⚠️|🔴|FATAL|ERROR|Cycle|Layer|Gate|Global|Rank|Health/.test(l)
            ).slice(0, 30).join('\n');

            const status = '${{ steps.lighthouse.outputs.exit_code }}' === '0' ? '✅ Passed' : '❌ Failed';

            const body = [
              `## 🏠 Lighthouse Architecture Audit — ${status}`,
              '',
              '```',
              keep || 'No findings.',
              '```',
              '',
              `📦 Full HTML reports in the [Actions run artifacts](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`,
            ].join('\n');

            // Update existing comment if present, else create
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Lighthouse Architecture Audit'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload Lighthouse Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_number }}
          path: |
            build/reports/lighthouse/
            **/build/reports/lighthouse/
          retention-days: 30

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/lighthouse/
          category: lighthouse
        continue-on-error: true
