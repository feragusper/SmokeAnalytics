<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smoke Analytics</title>
    <meta
        name="description"
        content="Smoke Analytics helps you track daily smoking activity, review history, and spot trends with less friction."
    />
    <meta name="theme-color" content="#185ADB" />
    <meta property="og:title" content="Smoke Analytics" />
    <meta
        property="og:description"
        content="Track smoking activity, review history, and understand trends in a cleaner web experience."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Smoke Analytics" />
    <meta
        name="twitter:description"
        content="Track smoking activity, review history, and understand trends in a cleaner web experience."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <style>
        @keyframes sa-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        @keyframes sa-page-enter {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="/smokeanalytics.js"></script>
</body>
</html>
