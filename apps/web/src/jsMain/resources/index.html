<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Smoke Analytics</title>
    <meta
        name="description"
        content="Smoke Analytics helps you track daily smoking activity, review history, and spot trends with less friction."
    />
    <meta name="theme-color" content="#006A6A" />
    <meta property="og:title" content="Smoke Analytics" />
    <meta
        property="og:description"
        content="Track smoking activity, review history, and understand trends in a cleaner web experience."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Smoke Analytics" />
    <meta
        name="twitter:description"
        content="Track smoking activity, review history, and understand trends in a cleaner web experience."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <style>
        html, body, #root {
            min-height: 100%;
        }

        body {
            margin: 0;
            font-family: "Roboto", system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
            background: #ffffff;
        }

        @keyframes sa-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Opacity-only: a `transform` here (even translateY(0) held by animation-fill
           `both`) makes the page wrapper a containing block for position:fixed, which
           trapped modals/dialogs inside the content column instead of the viewport. */
        @keyframes sa-page-enter {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="/smokeanalytics.js"></script>
</body>
</html>
